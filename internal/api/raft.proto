syntax = "proto3";

package raft;

option go_package = "zeroraft/api/raft";

// LogEntry represents a single entry in the Raft log
message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  string command = 3;
}

// RequestVote RPC
message RequestVote {
  string type = 1;  // "RequestVote"
  uint64 term = 2;
  int32 candidate_id = 3;
  uint64 last_log_index = 4;
  uint64 last_log_term = 5;
}

// RequestVoteResponse RPC
message RequestVoteResponse {
  string type = 1;  // "RequestVoteResponse"
  uint64 term = 2;
  bool vote_granted = 3;
}

// AppendEntries RPC
message AppendEntries {
  string type = 1;  // "AppendEntries"
  uint64 term = 2;
  int32 leader_id = 3;
  uint64 prev_log_index = 4;
  uint64 prev_log_term = 5;
  repeated LogEntry entries = 6;
  uint64 leader_commit = 7;
}

// AppendEntriesResponse RPC
message AppendEntriesResponse {
  string type = 1;  // "AppendEntriesResponse"
  uint64 term = 2;
  bool success = 3;
}