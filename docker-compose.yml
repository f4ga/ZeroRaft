version: "3.8"

services:
  node1:
    build: .
    image: zeroraft:latest
    command: ["--id", "1", "--addr", "node1:9000", "--peers", "node2:9000,node3:9000"]
    networks:
      - zeroraft-net
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3

  node2:
    build: .
    image: zeroraft:latest
    command: ["--id", "2", "--addr", "node2:9000", "--peers", "node1:9000,node3:9000"]
    networks:
      - zeroraft-net
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3

  node3:
    build: .
    image: zeroraft:latest
    command: ["--id", "3", "--addr", "node3:9000", "--peers", "node1:9000,node2:9000"]
    networks:
      - zeroraft-net
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  zeroraft-net:
    driver: bridge